# audio.cpp — Build and publish Docker images
#
# Produces multi-arch images on ghcr.io:
#   full-cpu          (latest, mutable)
#   full-cpu-<sha>    (pinned to commit, immutable)
#   full-cuda12       (latest, mutable)
#   full-cuda12-<sha> (pinned to commit, immutable)

name: Publish Docker image

on:
  workflow_dispatch:  # remove after testing
  schedule:
    - cron: '12 4 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  packages: write

env:
  IMAGE_REPO: ${{ github.repository }}

jobs:
  # ── Shared metadata (date computed once for all jobs) ───────────────────
  metadata:
    name: Metadata
    runs-on: ubuntu-24.04
    outputs:
      build_date: ${{ steps.date.outputs.date }}
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - name: Get build date
        id: date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
      - name: Compute short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA:0:8}" >> "$GITHUB_OUTPUT"

  # ── Build each arch, push by digest ────────────────────────────────────
  build:
    name: ${{ matrix.tag }} (${{ matrix.platforms }})
    needs: metadata
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── CPU ──
          - tag: cpu
            dockerfile: .devops/cpu.Dockerfile
            platforms: linux/amd64
            arch: amd64
            runs_on: ubuntu-24.04
          - tag: cpu
            dockerfile: .devops/cpu.Dockerfile
            platforms: linux/arm64
            arch: arm64
            runs_on: ubuntu-24.04-arm
          # ── CUDA 12 (uncomment skip: false to enable) ──
          - tag: cuda12
            dockerfile: .devops/cuda.Dockerfile
            platforms: linux/amd64
            arch: amd64
            runs_on: ubuntu-24.04
            free_disk: true
            cuda_version: "12.9.0"
            skip: true
          - tag: cuda12
            dockerfile: .devops/cuda.Dockerfile
            platforms: linux/arm64
            arch: arm64
            runs_on: ubuntu-24.04-arm
            free_disk: true
            cuda_version: "12.9.0"
            skip: true
    steps:
      - name: Skip when requested
        if: ${{ matrix.skip == true }}
        run: echo "Skipping ${{ matrix.tag }} build"

      - name: Checkout
        if: ${{ matrix.skip != true }}
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: ${{ matrix.skip != true }}
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: ${{ matrix.skip != true }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Free disk space
        if: ${{ matrix.skip != true && matrix.free_disk }}
        uses: ggml-org/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Build and push
        id: push
        if: ${{ matrix.skip != true }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: full
          platforms: ${{ matrix.platforms }}
          provenance: false
          outputs: type=image,name=ghcr.io/${{ env.IMAGE_REPO }},push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true
          build-args: |
            BUILD_DATE=${{ needs.metadata.outputs.build_date }}
            APP_VERSION=${{ github.sha }}
            APP_REVISION=${{ github.sha }}
            ${{ matrix.cuda_version && format('CUDA_VERSION={0}', matrix.cuda_version) || '' }}
          cache-from: type=registry,ref=ghcr.io/${{ env.IMAGE_REPO }}:cache-${{ matrix.arch }}-${{ matrix.tag }}
          cache-to: type=registry,ref=ghcr.io/${{ env.IMAGE_REPO }}:cache-${{ matrix.arch }}-${{ matrix.tag }},mode=max

      - name: Upload digest
        if: ${{ matrix.skip != true }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          arch="${{ matrix.platforms }}"
          arch="${arch#linux/}"
          digest="${{ steps.push.outputs.digest }}"

          if [[ "$digest" != sha256:* ]]; then
            echo "::error::Invalid digest format: $digest"
            exit 1
          fi

          printf '%s\n' "$digest" > "/tmp/digests/${{ matrix.tag }}-${arch}.txt"

      - name: Save digest artifact
        if: ${{ matrix.skip != true }}
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platforms }}-${{ matrix.tag }}
          path: /tmp/digests/
          if-no-files-found: error

  # ── Merge per-arch digests into multi-arch manifests ───────────────────
  merge:
    name: Merge ${{ matrix.tag }}
    needs: [metadata, build]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        tag: [cpu, cuda12]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create manifest
        shell: bash
        run: |
          set -euo pipefail

          repo="ghcr.io/${{ env.IMAGE_REPO }}"
          sha="${{ needs.metadata.outputs.short_sha }}"
          tag="${{ matrix.tag }}"

          mutable="full-${tag}"
          immutable="full-${tag}-${sha}"

          # Collect per-arch digests
          refs=()
          for arch in amd64 arm64; do
            file="/tmp/digests/${tag}-${arch}.txt"
            if [ ! -f "$file" ]; then
              echo "  No digest for ${tag}/${arch} (skipped)"
              continue
            fi
            digest="$(cat "$file")"

            if [[ "$digest" != sha256:* ]]; then
              echo "::error::Invalid digest in ${file}: $digest"
              exit 1
            fi

            refs+=("${repo}@${digest}")
          done

          if [ ${#refs[@]} -eq 0 ]; then
            echo "No digests found for ${tag}, skipping"
            exit 0
          fi

          # Only create mutable tag when both arches are present.
          if [ ${#refs[@]} -eq 1 ]; then
            echo "Single arch only — skipping mutable tag ${mutable}"
            echo "  → ${immutable} (single arch)"
            docker buildx imagetools create --tag "${repo}:${immutable}" "${refs[@]}"
          else
            echo "  → ${mutable} (${#refs[@]} arches)"
            docker buildx imagetools create --tag "${repo}:${mutable}" "${refs[@]}"

            echo "  → ${immutable} (${#refs[@]} arches)"
            docker buildx imagetools create --tag "${repo}:${immutable}" "${refs[@]}"
          fi