# audio.cpp — Build and publish Docker images
#
# Produces multi-arch images on ghcr.io:
#   full-cpu          (latest, mutable)
#   full-cpu-YYYYMMDD (pinned to date, immutable)
#   full-cuda12       (latest, mutable)
#   full-cuda12-YYYYMMDD (pinned to date, immutable)
#   full-cuda13       (latest, mutable)
#   full-cuda13-YYYYMMDD (pinned to date, immutable)

name: Build and publish Docker images

on:
  schedule:
    - cron: '12 4 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  packages: write

env:
  IMAGE_REPO: ${{ github.repository }}

jobs:
  # ── Shared metadata (date computed once for all jobs) ───────────────────
  metadata:
    name: Metadata
    runs-on: ubuntu-24.04
    outputs:
      build_date: ${{ steps.date.outputs.date }}
      date_tag: ${{ steps.date.outputs.tag }}
    steps:
      - name: Get build date
        id: date
        run: |
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "tag=$(date -u +'%Y%m%d')" >> "$GITHUB_OUTPUT"

  # ── Build each arch, push by digest ────────────────────────────────────
  build:
    name: ${{ matrix.tag }} (${{ matrix.platforms }})
    needs: metadata
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── CPU ──
          - tag: cpu
            dockerfile: .devops/cpu.Dockerfile
            platforms: linux/amd64
            arch: amd64
            runs_on: ubuntu-24.04
            skip: true
          - tag: cpu
            dockerfile: .devops/cpu.Dockerfile
            platforms: linux/arm64
            arch: arm64
            runs_on: ubuntu-24.04-arm
            skip: true
          # ── CUDA 12 ──
          - tag: cuda12
            dockerfile: .devops/cuda.Dockerfile
            platforms: linux/amd64
            arch: amd64
            runs_on: ubuntu-24.04
            free_disk: true
            cuda_version: "12.9.2"
            skip: false
          - tag: cuda12
            dockerfile: .devops/cuda.Dockerfile
            platforms: linux/arm64
            arch: arm64
            runs_on: ubuntu-24.04-arm
            free_disk: true
            cuda_version: "12.9.2"
            skip: false
          # ── CUDA 13 ──
          - tag: cuda13
            dockerfile: .devops/cuda.Dockerfile
            platforms: linux/amd64
            arch: amd64
            runs_on: ubuntu-24.04
            free_disk: true
            cuda_version: "13.3.0"
            skip: false
          - tag: cuda13
            dockerfile: .devops/cuda.Dockerfile
            platforms: linux/arm64
            arch: arm64
            runs_on: ubuntu-24.04-arm
            free_disk: true
            cuda_version: "13.3.0"
            skip: false
    steps:
      - name: Skip when requested
        if: ${{ matrix.skip == true }}
        run: echo "Skipping ${{ matrix.tag }} build"

      - name: Checkout
        if: ${{ matrix.skip != true }}
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: ${{ matrix.skip != true }}
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: ${{ matrix.skip != true }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Free disk space
        if: ${{ matrix.skip != true && matrix.free_disk }}
        uses: ggml-org/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Build and push
        id: push
        if: ${{ matrix.skip != true }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: full
          platforms: ${{ matrix.platforms }}
          provenance: false
          outputs: type=image,name=ghcr.io/${{ env.IMAGE_REPO }},push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true
          build-args: |
            BUILD_DATE=${{ needs.metadata.outputs.build_date }}
            APP_VERSION=${{ github.sha }}
            APP_REVISION=${{ github.sha }}
            IMAGE_URL=${{ github.server_url }}/${{ github.repository }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
            ${{ matrix.cuda_version && format('CUDA_VERSION={0}', matrix.cuda_version) || '' }}
          cache-from: type=registry,ref=ghcr.io/${{ env.IMAGE_REPO }}:cache-${{ matrix.arch }}-${{ matrix.tag }}
          cache-to: type=registry,ref=ghcr.io/${{ env.IMAGE_REPO }}:cache-${{ matrix.arch }}-${{ matrix.tag }},mode=max

      - name: Upload digest
        if: ${{ matrix.skip != true }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"

          if [[ "$digest" != sha256:* ]]; then
            echo "::error::Invalid digest format: $digest"
            exit 1
          fi

          printf '%s\n' "$digest" > "/tmp/digests/${{ matrix.tag }}-${{ matrix.arch }}.txt"

      - name: Save digest artifact
        if: ${{ matrix.skip != true }}
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}-${{ matrix.tag }}
          path: /tmp/digests/
          if-no-files-found: error

  # ── Merge per-arch digests into multi-arch manifests ───────────────────
  merge:
    name: Merge ${{ matrix.tag }}
    needs: [metadata, build]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        tag: [cpu, cuda12, cuda13]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create manifest
        shell: bash
        run: |
          set -euo pipefail

          repo="ghcr.io/${{ env.IMAGE_REPO }}"
          date_tag="${{ needs.metadata.outputs.date_tag }}"
          tag="${{ matrix.tag }}"
          build_date="${{ needs.metadata.outputs.build_date }}"
          image_url="${{ github.server_url }}/${{ github.repository }}"

          mutable="full-${tag}"
          immutable="full-${tag}-${date_tag}"

          # Collect per-arch digests
          expected_arches=(amd64 arm64)
          refs=()
          missing=()
          for arch in "${expected_arches[@]}"; do
            file="/tmp/digests/${tag}-${arch}.txt"
            if [ ! -f "$file" ]; then
              missing+=("$arch")
              continue
            fi
            digest="$(cat "$file")"

            if [[ "$digest" != sha256:* ]]; then
              echo "::error::Invalid digest in ${file}: $digest"
              exit 1
            fi

            refs+=("${repo}@${digest}")
          done

          # Zero digests → tag was intentionally skipped (skip: true), exit cleanly
          if [ ${#refs[@]} -eq 0 ]; then
            echo "No digests found for ${tag}, skipping"
            exit 0
          fi

          # Some but not all → a build failed; fail loudly so it's visible in CI
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing digests for ${tag}: ${missing[*]}"
            echo "  Partial failure — mutable tag may be stale"
            exit 1
          fi

          # OCI annotations for the merged manifest
          annotations=(
            --annotation "index:org.opencontainers.image.created=${build_date}"
            --annotation "index:org.opencontainers.image.revision=${{ github.sha }}"
            --annotation "index:org.opencontainers.image.url=${image_url}"
            --annotation "index:org.opencontainers.image.source=${image_url}"
          )

          echo "  → ${mutable} (${#refs[@]} arches)"
          docker buildx imagetools create "${annotations[@]}" --tag "${repo}:${mutable}" "${refs[@]}"

          echo "  → ${immutable} (${#refs[@]} arches)"
          docker buildx imagetools create "${annotations[@]}" --tag "${repo}:${immutable}" "${refs[@]}"
